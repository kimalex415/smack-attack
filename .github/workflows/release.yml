name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build arm64
        run: swiftc smack.swift -o smack-arm64 -target arm64-apple-macosx12.0

      - name: Build x86_64
        run: swiftc smack.swift -o smack-x86_64 -target x86_64-apple-macosx12.0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            smack-arm64
            smack-x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
